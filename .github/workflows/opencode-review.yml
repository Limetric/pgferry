name: OpenCode Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled]

jobs:
  opencode-review:
    if: github.event.action != 'labeled' || github.event.label.name == 'trigger:review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: anomalyco/opencode/github@latest
        id: review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/minimax-m2.5-free
          prompt: |
            Review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use AGENTS.md file for guidance on style and conventions.

            IMPORTANT: Be concise and avoid unnecessary verbosity. Focus on actionable feedback. Be constructive and helpful.

      - name: Remove trigger:review label
        if: github.event.action == 'labeled'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label 'trigger:review' || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
