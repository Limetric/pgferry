name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://pgferry.com
      PUBLIC_PLAUSIBLE_DOMAIN: pgferry.com
      PUBLIC_PLAUSIBLE_SRC: ${{ secrets.PUBLIC_PLAUSIBLE_SRC }}
      PUBLIC_PLAUSIBLE_API: ${{ secrets.PUBLIC_PLAUSIBLE_API }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm clean-install --progress=false

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy site/dist --project-name=pgferry
