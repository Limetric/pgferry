name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./... -count=1

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
        working-directory: site
      - run: bun run build
        working-directory: site
      - run: bun run check-routes
        working-directory: site

  integration-mysql:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql: "5.7"
            postgres: "latest"
          - mysql: "8.0"
            postgres: "latest"
          - mysql: "lts"
            postgres: "latest"
          - mysql: "innovation"
            postgres: "latest"
    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pgferry_test
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgferry_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      MYSQL_DSN: "root:root@tcp(127.0.0.1:3306)/pgferry_test"
      POSTGRES_DSN: "postgres://postgres:postgres@127.0.0.1:5432/pgferry_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags integration -count=1 -v -run TestIntegration_MySQL ./...

  integration-sqlite:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        postgres: ["latest"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgferry_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      POSTGRES_DSN: "postgres://postgres:postgres@127.0.0.1:5432/pgferry_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags integration -count=1 -v -run TestIntegration_SQLite ./...

  integration-mysql-postgis:
    runs-on: ubuntu-latest
    needs: test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pgferry_test
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgferry_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres -d pgferry_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      MYSQL_DSN: "root:root@tcp(127.0.0.1:3306)/pgferry_test"
      POSTGRES_DSN: "postgres://postgres:postgres@127.0.0.1:5432/pgferry_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags integration -count=1 -v -run TestIntegration_MySQL_PostGIS ./...

  integration-mssql:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - mssql: "2017-latest"
            postgres: "latest"
          - mssql: "2019-latest"
            postgres: "latest"
          - mssql: "2022-latest"
            postgres: "latest"
          - mssql: "2025-latest"
            postgres: "latest"
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:${{ matrix.mssql }}
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "YourStrong!Pass"
          MSSQL_SA_PASSWORD: "YourStrong!Pass"
        ports:
          - "1433:1433"
        options: >-
          --health-cmd="bash -c '(echo > /dev/tcp/localhost/1433) 2>/dev/null'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgferry_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      MSSQL_DSN: "sqlserver://sa:YourStrong!Pass@127.0.0.1:1433?database=pgferry_test"
      POSTGRES_DSN: "postgres://postgres:postgres@127.0.0.1:5432/pgferry_test?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create MSSQL test database
        run: |
          container=$(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:${{ matrix.mssql }}")
          docker exec "$container" bash -c '
            if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Pass" -Q "CREATE DATABASE pgferry_test" -C -b
            else
              /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Pass" -Q "CREATE DATABASE pgferry_test" -b
            fi'
      - run: go test -tags integration -count=1 -v -run TestIntegration_MSSQL ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, integration-mysql, integration-sqlite, integration-mysql-postgis, integration-mssql]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build -ldflags="-X main.buildVersion=dev -X main.buildCommit=${GITHUB_SHA}" -o pgferry .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="pgferry-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w -X main.buildVersion=${GITHUB_REF_NAME} -X main.buildCommit=${GITHUB_SHA}" -o "$out" .
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
